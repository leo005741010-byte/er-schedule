<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="行事曆">
<meta name="theme-color" content="#0f172a">
<title>陳孝綱 的行事曆</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --ink:#1e293b; --muted:#64748b; --line:#e6eaf0;
  --brand:#1565c0; --brand-soft:#e8f1fc; --accent:#0d9488;
  --wknd:#c0392b; --wknd-bg:#fff5f5; --term:#0e7c66;
  --today:#1565c0; --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --shadow-lg:0 10px 40px rgba(15,23,42,.18);
  --sheet:#ffffff; --chip-ink:#0f172a;
  --sh-zhu-bg:#fff8e1; --sh-zhu-fg:#b45309; --sh-zhu-dot:#f59e0b;
  --sh-zao-bg:#e8f7ec; --sh-zao-fg:#15803d; --sh-zao-dot:#22c55e;
  --sh-xiao-bg:#e6f0fd; --sh-xiao-fg:#1565c0; --sh-xiao-dot:#3b82f6;
  --sh-da-bg:#f4eafb; --sh-da-fg:#7b1fa2; --sh-da-dot:#a855f7;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b1220; --card:#151d2e; --ink:#e8edf6; --muted:#93a1b8; --line:#25304a;
    --brand:#5b9be8; --brand-soft:#18263e; --accent:#2dd4bf;
    --wknd:#f87171; --wknd-bg:#241618; --term:#34d399;
    --today:#5b9be8; --shadow:0 1px 3px rgba(0,0,0,.4);
    --shadow-lg:0 14px 46px rgba(0,0,0,.6);
    --sheet:#151d2e; --chip-ink:#e8edf6;
    --sh-zhu-bg:#3a2c0c; --sh-zhu-fg:#fbbf24; --sh-zhu-dot:#f59e0b;
    --sh-zao-bg:#12331f; --sh-zao-fg:#4ade80; --sh-zao-dot:#22c55e;
    --sh-xiao-bg:#13294a; --sh-xiao-fg:#7db4f5; --sh-xiao-dot:#3b82f6;
    --sh-da-bg:#2e1740; --sh-da-fg:#c98be6; --sh-da-dot:#a855f7;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.4;
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.wrap{max-width:960px;margin:0 auto;padding:0 12px 120px;padding-top:env(safe-area-inset-top)}

/* ===== App bar ===== */
.appbar{
  position:sticky;top:0;z-index:30;background:var(--bg);
  padding:calc(env(safe-area-inset-top) + 10px) 4px 8px;
  display:flex;align-items:center;gap:10px;
}
.appbar h1{font-size:19px;font-weight:800;margin:0;letter-spacing:.3px;flex:1;display:flex;align-items:center;gap:7px}
.cloud{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600;
  background:var(--card);padding:5px 9px;border-radius:20px;box-shadow:var(--shadow);white-space:nowrap}
.cloud .dot{width:7px;height:7px;border-radius:50%;background:#cbd5e1;transition:.3s}
.cloud.ok .dot{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.cloud.err .dot{background:#f59e0b}

/* ===== Month nav ===== */
.navbar{display:flex;align-items:center;gap:8px;margin:4px 4px 12px;flex-wrap:wrap}
.navgroup{display:flex;align-items:center;gap:4px;flex:1;min-width:200px}
.navbar .mtitle{font-size:19px;font-weight:800;flex:1;letter-spacing:.5px;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 4px;border-radius:11px;transition:.12s;color:var(--ink)}
.navbar .mtitle:active{background:var(--card)}
.navbar .mtitle::after{content:"▾";font-size:12px;color:var(--muted);font-weight:700}
.navbar .mtitle small{font-size:13px;color:var(--muted);font-weight:600;margin-left:6px}
/* 月份選擇器 */
.yearnav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:18px}
.yearnav .yr{font-size:21px;font-weight:800;min-width:96px;text-align:center}
.monthgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mopt{padding:17px 0;border-radius:14px;background:var(--bg);border:1.5px solid var(--line);
  font-size:15px;font-weight:700;color:var(--ink);transition:.12s;position:relative}
.mopt:active{transform:scale(.95)}
.mopt.now{color:var(--brand);border-color:var(--brand)}
.mopt.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.mopt .nowdot{position:absolute;top:8px;right:10px;width:6px;height:6px;border-radius:50%;background:var(--brand)}
.mopt.on .nowdot{background:#fff}
.iconbtn{width:38px;height:38px;border-radius:12px;background:var(--card);box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--ink);transition:.15s;flex-shrink:0}
.iconbtn:active{transform:scale(.92)}
.pill{background:var(--card);box-shadow:var(--shadow);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--brand);transition:.15s}
.pill:active{transform:scale(.95)}
.seg{display:flex;background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.seg button{padding:8px 13px;font-size:13px;font-weight:700;color:var(--muted);transition:.15s}
.seg button.active{background:var(--brand);color:#fff}

/* ===== Today card ===== */
.todaycard{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:14px 16px;margin:0 2px 14px;
  border:1px solid var(--line)}
.todaycard .tc-head{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
.todaycard .tc-date{font-size:15px;font-weight:800}
.todaycard .tc-dow{font-size:12px;color:var(--muted);font-weight:600}
.todaycard .tc-badge{margin-left:auto;font-size:11px;font-weight:700;color:var(--wknd);background:var(--wknd-bg);padding:2px 8px;border-radius:8px}
.todaycard .tc-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.tc-empty{font-size:13px;color:var(--muted)}

/* ===== chips ===== */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:5px 10px;border-radius:9px;line-height:1.2}
.chip .t{font-weight:600;opacity:.85;font-size:11.5px}
.chip.sh-主白{background:var(--sh-zhu-bg);color:var(--sh-zhu-fg)}
.chip.sh-早班{background:var(--sh-zao-bg);color:var(--sh-zao-fg)}
.chip.sh-小夜{background:var(--sh-xiao-bg);color:var(--sh-xiao-fg)}
.chip.sh-大夜{background:var(--sh-da-bg);color:var(--sh-da-fg)}
.chip.sh-extra{background:rgba(120,144,156,.16);color:#607d8b}
.chip .cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chip.ev{background:var(--brand-soft);color:var(--brand)}

/* ===== Calendar grid ===== */
.cal{background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--line)}
.dowrow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--card);border-bottom:1px solid var(--line)}
.dowrow div{text-align:center;font-size:11.5px;font-weight:700;color:var(--muted);padding:9px 0}
.dowrow div.we{color:var(--wknd)}
.grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{min-height:82px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:4px 4px 3px;
  position:relative;overflow:hidden;transition:background .12s;display:flex;flex-direction:column;gap:2px}
.cell:nth-child(7n){border-right:none}
.cell.pad{background:transparent}
.cell:active:not(.pad){background:var(--brand-soft)}
.cell .dnum{font-size:13px;font-weight:700;width:23px;height:23px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;flex-shrink:0}
.cell.we .dnum{color:var(--wknd)}
.cell.hol-tw:not(.today) .dnum{color:var(--wknd)}
.cell.today .dnum{background:var(--today);color:#fff}
.cell .daytop{display:flex;align-items:center;gap:3px;min-height:22px;overflow:hidden}
.cell .sub{font-size:9px;font-weight:700;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.sub-lunar{color:var(--muted)}
.sub-term{color:var(--term)}
.sub-hol{color:var(--wknd)}
.cbar{height:4.5px;border-radius:3px;margin-top:1px}
.cbar.sh-主白{background:var(--sh-zhu-dot)} .cbar.sh-早班{background:var(--sh-zao-dot)}
.cbar.sh-小夜{background:var(--sh-xiao-dot)} .cbar.sh-大夜{background:var(--sh-da-dot)}
.cbar.sh-extra{background:#90a4ae}
.cell .mini{font-size:9.5px;font-weight:700;padding:1.5px 4px;border-radius:5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.35}
.mini.sh-主白{background:var(--sh-zhu-bg);color:var(--sh-zhu-fg)} .mini.sh-早班{background:var(--sh-zao-bg);color:var(--sh-zao-fg)}
.mini.sh-小夜{background:var(--sh-xiao-bg);color:var(--sh-xiao-fg)} .mini.sh-大夜{background:var(--sh-da-bg);color:var(--sh-da-fg)}
.mini.sh-extra{background:rgba(120,144,156,.16);color:#607d8b}
.mini.ev{background:var(--brand-soft);color:var(--brand)}
.mini.ev b{font-weight:800;font-variant-numeric:tabular-nums}
.cell .more{font-size:9px;color:var(--muted);font-weight:700;padding-left:3px}

/* ===== Agenda ===== */
.agenda{display:none;flex-direction:column;gap:2px}
.agenda.show{display:flex}
.ag-day{background:var(--card);border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--line);
  margin-bottom:9px;overflow:hidden}
.ag-dhead{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid var(--line)}
.ag-dnum{font-size:20px;font-weight:800;min-width:30px;text-align:center}
.ag-dnum.we{color:var(--wknd)} .ag-dnum.today{color:var(--today)}
.ag-dmeta{display:flex;flex-direction:column;gap:1px}
.ag-dmeta .d1{font-size:12px;font-weight:700} .ag-dmeta .d2{font-size:11px;color:var(--muted)}
.ag-todaytag{margin-left:auto;font-size:10px;font-weight:800;color:#fff;background:var(--today);padding:2px 9px;border-radius:8px}
.ag-body{padding:9px 14px;display:flex;flex-direction:column;gap:7px}
.ag-item{display:flex;align-items:center;gap:10px}
.ag-time{font-size:11.5px;font-weight:700;color:var(--muted);min-width:82px;font-variant-numeric:tabular-nums}
.ag-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}

/* ===== FAB ===== */
.fab{position:fixed;right:calc(env(safe-area-inset-right) + 18px);bottom:calc(env(safe-area-inset-bottom) + 20px);
  width:60px;height:60px;border-radius:20px;background:var(--brand);color:#fff;font-size:30px;font-weight:300;
  display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(21,101,192,.4);z-index:40;transition:.15s}
.fab:active{transform:scale(.9)}

/* ===== Sheet / modal ===== */
.mask{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(2px)}
.mask.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--sheet);
  border-radius:22px 22px 0 0;box-shadow:var(--shadow-lg);transform:translateY(102%);transition:transform .28s cubic-bezier(.4,1.2,.5,1);
  max-height:88vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.sheet.show{transform:translateY(0)}
.sheet .grab{width:40px;height:4.5px;border-radius:3px;background:var(--line);margin:9px auto 3px}
.sheet-head{display:flex;align-items:center;gap:10px;padding:6px 18px 12px;border-bottom:1px solid var(--line)}
.sheet-head .sh-date{font-size:19px;font-weight:800}
.sheet-head .sh-dow{font-size:13px;color:var(--muted);font-weight:600}
.sheet-head .sh-hol{font-size:11px;font-weight:700;color:var(--wknd);background:var(--wknd-bg);padding:2px 8px;border-radius:8px}
.sheet-body{overflow-y:auto;padding:14px 18px 22px;-webkit-overflow-scrolling:touch}
.sec-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin:14px 0 8px;text-transform:uppercase}
.sec-title:first-child{margin-top:0}

.shift-line{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;margin-bottom:7px}
.shift-line.sh-主白{background:var(--sh-zhu-bg)} .shift-line.sh-早班{background:var(--sh-zao-bg)}
.shift-line.sh-小夜{background:var(--sh-xiao-bg)} .shift-line.sh-大夜{background:var(--sh-da-bg)}
.shift-line.sh-extra{background:rgba(120,144,156,.14)}
.shift-line .sl-name{font-size:15px;font-weight:800}
.shift-line.sh-主白 .sl-name{color:var(--sh-zhu-fg)} .shift-line.sh-早班 .sl-name{color:var(--sh-zao-fg)}
.shift-line.sh-小夜 .sl-name{color:var(--sh-xiao-fg)} .shift-line.sh-大夜 .sl-name{color:var(--sh-da-fg)}
.shift-line.sh-extra .sl-name{color:#607d8b}
.shift-line .sl-time{margin-left:auto;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);opacity:.85}
.noshift{font-size:13px;color:var(--muted);padding:4px 2px 2px}

.ev-line{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;margin-bottom:7px;
  background:var(--bg);border:1px solid var(--line);transition:.12s}
.ev-line:active{transform:scale(.985)}
.ev-line .ev-cdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ev-line .ev-main{flex:1;min-width:0}
.ev-line .ev-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-line .ev-sub{font-size:12px;color:var(--muted);margin-top:1px}
.ev-line .ev-cat{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;flex-shrink:0}
.ev-line .chev{color:var(--muted);font-size:16px;flex-shrink:0}

.addbtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border-radius:13px;
  background:var(--brand-soft);color:var(--brand);font-size:14px;font-weight:800;margin-top:4px;transition:.12s}
.addbtn:active{transform:scale(.98)}

.otherbox{background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:4px 0;margin-top:2px}
.other-row{display:flex;align-items:center;gap:9px;padding:7px 13px;font-size:12.5px}
.other-row .or-slot{font-weight:700;min-width:52px;color:var(--muted);font-variant-numeric:tabular-nums}
.other-row .or-doc{font-weight:600}
.other-row .or-doc.me{color:var(--brand);font-weight:800}
.other-row .or-time{margin-left:auto;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}

/* ===== Form ===== */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px;letter-spacing:.3px}
.field input[type=text],.field input[type=date],.field input[type=time],.field textarea{
  width:100%;padding:12px 13px;border-radius:12px;border:1.5px solid var(--line);background:var(--bg);
  color:var(--ink);font-size:15px;font-family:inherit;transition:.15s;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--brand);background:var(--card)}
.field textarea{resize:vertical;min-height:64px}
.timerow{display:flex;gap:10px;align-items:center}
.timerow .tspan{color:var(--muted);font-weight:700}
.timerow>div{flex:1}
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.catopt{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 4px;border-radius:12px;
  border:1.5px solid var(--line);background:var(--bg);font-size:12px;font-weight:700;color:var(--muted);transition:.12s}
.catopt .ci{font-size:19px}
.catopt.on{border-color:transparent;color:#fff}
.toggle{display:flex;align-items:center;gap:10px}
.switch{position:relative;width:50px;height:29px;border-radius:16px;background:var(--line);transition:.2s;flex-shrink:0}
.switch.on{background:var(--brand)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:23px;height:23px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on::after{transform:translateX(21px)}
.formbtns{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;padding:14px;border-radius:13px;font-size:15px;font-weight:800;transition:.12s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--brand);color:#fff}
.btn.ghost{background:var(--bg);color:var(--muted);border:1.5px solid var(--line)}
.btn.danger{background:var(--wknd-bg);color:var(--wknd);flex:0 0 auto;padding:14px 18px}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 92px);transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:24px;font-size:13.5px;font-weight:700;
  z-index:80;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow-lg);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.legend{display:flex;flex-wrap:wrap;gap:9px 14px;justify-content:center;margin:14px 4px 0;font-size:11px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:5px;font-weight:600}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <div class="appbar">
    <h1>📅 <span id="app-title">陳孝綱 的行事曆</span></h1>
    <div class="cloud" id="cloud"><span class="dot"></span><span id="cloud-txt">連線中…</span></div>
  </div>

  <div class="navbar">
    <div class="navgroup">
      <button class="iconbtn" onclick="shiftMonth(-1)">‹</button>
      <button class="mtitle" id="mtitle" onclick="openMonthPicker()"></button>
      <button class="iconbtn" onclick="shiftMonth(1)">›</button>
    </div>
    <button class="pill" onclick="goToday()">今天</button>
    <div class="seg">
      <button id="seg-month" class="active" onclick="setView('month')">月</button>
      <button id="seg-list" onclick="setView('list')">清單</button>
    </div>
  </div>

  <div class="todaycard" id="todaycard"></div>

  <!-- Month view -->
  <div id="monthview">
    <div class="cal">
      <div class="dowrow">
        <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div class="we">六</div><div class="we">日</div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- Agenda view -->
  <div class="agenda" id="listview"></div>
</div>

<button class="fab" onclick="openForm(null, selectedDate||todayStr())">＋</button>

<!-- Day sheet -->
<div class="mask" id="mask" onclick="closeSheets(event)"></div>
<div class="sheet" id="daysheet">
  <div class="grab"></div>
  <div class="sheet-head">
    <div><div class="sh-date" id="ds-date"></div></div>
    <div class="sh-dow" id="ds-dow"></div>
    <span class="sh-hol" id="ds-hol" style="display:none">假日</span>
  </div>
  <div class="sheet-body" id="ds-body"></div>
</div>

<!-- Event form sheet -->
<div class="sheet" id="formsheet">
  <div class="grab"></div>
  <div class="sheet-head">
    <div class="sh-date" id="fm-title">新增行程</div>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label>標題</label>
      <input type="text" id="fm-name" placeholder="例：科務會議、部門開會…" autocomplete="off">
    </div>
    <div class="field">
      <label>分類</label>
      <div class="catgrid" id="fm-cats"></div>
    </div>
    <div class="field">
      <label>日期</label>
      <input type="date" id="fm-date">
    </div>
    <div class="field">
      <div class="toggle"><div class="switch" id="fm-allday-sw" onclick="toggleAllDay()"></div>
        <label style="margin:0">全天(不指定時間)</label></div>
    </div>

<script>
/* ============================================================
   陳孝綱 個人行事曆 — 串接急診醫師排班系統 (唯讀班表) + 私人行程雲端同步
   班表來源: Firebase erScheduleData (與排班系統同一資料庫，只讀不寫)
   私人行程: Firebase chenCalendar (新節點，讀寫)
   ============================================================ */
const CFG={
  CLOUD_URL:'https://tenchener-488d2-default-rtdb.firebaseio.com/',
  SCHED_REF:'erScheduleData',      // 只讀
  CAL_REF:'cal_cheng_9k7x2q4f',    // 讀寫（我的行程）— 難猜節點名，增加隱私遮蔽
  MY_NAME:'陳孝綱', MY_ID_FALLBACK:'d1',
  LS_SCHED:'chenCal_schedCache_v1',
  LS_EVENTS:'chenCal_events_v1',
};
const NOCLOUD=/[?&]nocloud=1/.test(location.search);   // 測試用：略過雲端

/* ---------- 狀態 ---------- */
const state={
  doctors:[], schedule:{}, holidays:new Set(), defaultSplit:20, holidaySplit:17,
  events:{},                 // id -> event
  myId:null,
  view:'month',
};
let viewY, viewM;            // 目前檢視的年、月(0-based)
let selectedDate=null;
let editingId=null;
let formAllDay=false, formCat='meeting';
const _clientId=Math.random().toString(36).slice(2)+Date.now().toString(36);

/* ============================================================
   班別 / 日期 輔助函式（與排班系統邏輯完全一致）
   ============================================================ */
const SLOTS=['主白','早班','小夜','大夜'];
const EXTRA_KINDS=[{v:'',name:'中天',color:'#78909c'},{v:'yangtian',name:'楊天',color:'#546e7a'},{v:'icu',name:'ICU',color:'#00838f'}];
function kindInfo(v){return EXTRA_KINDS.find(k=>k.v===(v||''))||EXTRA_KINDS[0];}
function fmtDate(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getDOW(ds){const[y,mo,d]=ds.split('-').map(Number);return (new Date(Date.UTC(y,mo-1,d)).getUTCDay()+6)%7;} // Mon=0..Sun=6
function addDays(ds,n){const[y,mo,d]=ds.split('-').map(Number);const dt=new Date(Date.UTC(y,mo-1,d));dt.setUTCDate(dt.getUTCDate()+n);return dt.toISOString().slice(0,10);}
function isWeekend(ds){const w=getDOW(ds);return w===5||w===6;}
function isHoliday(ds){return state.holidays.has(ds)||isWeekend(ds);}
function clampSplit(v){return Math.min(20,Math.max(16,v||20));}
function defaultSplitFor(ds){return clampSplit(isHoliday(ds)?(state.holidaySplit||17):(state.defaultSplit||20));}
function slotRange(slot,split){
  switch(slot){
    case '主白':return {s:8,e:20};
    case '早班':return {s:8,e:split};
    case '小夜':return {s:split,e:26};
    case '大夜':return {s:20,e:32};
  }
}
const DOW_TW=['一','二','三','四','五','六','日'];
function todayStr(){const d=new Date();return fmtDate(d.getFullYear(),d.getMonth(),d.getDate());}

/* 取得某日「我」的所有班次（沿用排班系統 buildDoctorICS 的時段計算） */
function myShiftsForDate(ds){
  const out=[];
  const day=state.schedule[ds];
  if(!day||!state.myId) return out;
  const sp=day.split||defaultSplitFor(ds);
  for(const slot of SLOTS){
    if(day[slot]!==state.myId) continue;
    const ct=day.customTimes&&day.customTimes[slot];
    let s,e;
    if(ct){const m=ct.match(/^(\d{1,2})-(\d{1,2})$/);if(!m)continue;s=+m[1];e=+m[2];if(e<=s)e+=24;}
    else{const r=slotRange(slot,sp);s=r.s;e=r.e;}
    out.push({type:slot,name:slot,s,e,time:hhmm(s)+'–'+hhmm(e),range:rng(s,e),cls:'sh-'+slot});
  }
  for(const ex of (day.extras||[])){
    if(ex.docId!==state.myId||!ex.timeRange) continue;
    const m=ex.timeRange.match(/^(\d{1,2})-(\d{1,2})$/);if(!m)continue;
    let s=+m[1],e=+m[2];if(e<=s)e+=24;
    out.push({type:'extra',name:kindInfo(ex.kind).name,s,e,time:hhmm(s)+'–'+hhmm(e),range:rng(s,e),cls:'sh-extra'});
  }
  out.sort((a,b)=>a.s-b.s);
  return out;
}
function hhmm(h){return String(h%24).padStart(2,'0')+':00';}
function rng(s,e){return String(s%24).padStart(2,'0')+'-'+String(e%24).padStart(2,'0');} // 20-02 / 20-08 格式

/* 當日全科班表（給「同事」小清單） */
function allSlotsForDate(ds){
  const day=state.schedule[ds]; if(!day) return [];
  const sp=day.split||defaultSplitFor(ds);
  const rows=[];
  for(const slot of SLOTS){
    const id=day[slot]; const doc=id?state.doctors.find(d=>d.id===id):null;
    const ct=day.customTimes&&day.customTimes[slot];
    let s,e;
    if(ct){const m=ct.match(/^(\d{1,2})-(\d{1,2})$/);if(m){s=+m[1];e=+m[2];if(e<=s)e+=24;}}
    if(s==null){const r=slotRange(slot,sp);s=r.s;e=r.e;}
    rows.push({slot,range:rng(s,e),name:doc?doc.name:'—',isMe:id===state.myId,time:hhmm(s)+'–'+hhmm(e)});
  }
  return rows;
}

/* ============================================================
   事件時間工具
   ============================================================ */
function eventsForDate(ds){
  return Object.values(state.events).filter(e=>e.date===ds)
    .sort((a,b)=>(a.allDay?'':a.start||'').localeCompare(b.allDay?'':b.start||'')||(a.allDay?-1:1));
}
const CATS=[
  {v:'meeting',name:'開會',color:'#0d9488',icon:'📋'},
  {v:'admin',name:'公務',color:'#2563eb',icon:'🏥'},
  {v:'personal',name:'私人',color:'#7c3aed',icon:'🏠'},
  {v:'reminder',name:'提醒',color:'#d97706',icon:'🔔'},
];
function catInfo(v){return CATS.find(c=>c.v===v)||CATS[0];}

/* ============================================================
   農曆 + 節氣 + 台灣國定假日（全部本機計算，可離線）
   萬年曆資料表 1900–2049；每年一個 16-bit 數字編碼各月大小月與閏月
   ============================================================ */
const LUNAR_INFO=[
0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,//1900
0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,//1910
0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,//1920
0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,//1930
0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,//1940
0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,//1950
0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,//1960
0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b5a0,0x195a6,//1970
0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,//1980
0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,//1990
0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,//2000
0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,//2010
0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,//2020
0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,//2030
0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0 //2040
];
const LMONTH=['正','二','三','四','五','六','七','八','九','十','冬','臘'];
function lDayName(d){
  if(d===10)return '初十'; if(d===20)return '二十'; if(d===30)return '三十';
  const t=['','一','二','三','四','五','六','七','八','九','十'];
  if(d<10) return '初'+t[d];
  if(d<20) return '十'+t[d-10];
  return '廿'+t[d-20];
}
function lLeapMonth(y){return LUNAR_INFO[y-1900]&0xf;}
function lLeapDays(y){return lLeapMonth(y)?((LUNAR_INFO[y-1900]&0x10000)?30:29):0;}
function lMonthDays(y,m){return (LUNAR_INFO[y-1900]&(0x10000>>m))?30:29;}
function lYearDays(y){let s=348;for(let i=0x8000;i>0x8;i>>=1)s+=(LUNAR_INFO[y-1900]&i)?1:0;return s+lLeapDays(y);}
function solar2lunar(y,m,d){        // m 1-based
  if(y<1900||y>2049) return null;
  let offset=Math.round((Date.UTC(y,m-1,d)-Date.UTC(1900,0,31))/86400000);
  let i,temp=0;
  for(i=1900;i<2050&&offset>0;i++){temp=lYearDays(i);offset-=temp;}
  if(offset<0){offset+=temp;i--;}
  const lYear=i; const leap=lLeapMonth(i); let isLeap=false;
  for(i=1;i<13&&offset>0;i++){
    if(leap>0&&i===leap+1&&!isLeap){--i;isLeap=true;temp=lLeapDays(lYear);}
    else temp=lMonthDays(lYear,i);
    if(isLeap&&i===leap+1) isLeap=false;
    offset-=temp;
  }
  if(offset===0&&leap>0&&i===leap+1){ if(isLeap) isLeap=false; else{isLeap=true;--i;} }
  if(offset<0){offset+=temp;--i;}
  return {lYear,lMonth:i,lDay:offset+1,isLeap};
}
// 24 節氣（本機天文公式，日期準確度足夠）
const TERMS=['小寒','大寒','立春','雨水','驚蟄','春分','清明','穀雨','立夏','小滿','芒種','夏至','小暑','大暑','立秋','處暑','白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'];
const TERM_MIN=[0,21208,42467,63836,85337,107014,128867,150921,173149,195551,218072,240693,263343,285989,308563,331033,353350,375494,397447,419210,440795,462224,483532,504758];
function termDay(y,n){
  const off=new Date(31556925974.7*(y-1900)+TERM_MIN[n]*60000+Date.UTC(1900,0,6,2,5,0));
  return off.getUTCDate();
}
function solarTermName(y,m,d){       // m 1-based
  const a=2*(m-1), b=a+1;
  if(termDay(y,a)===d) return TERMS[a];
  if(termDay(y,b)===d) return TERMS[b];
  return null;
}
function lunarShort(ds){             // 月曆格子小字：初一顯示月、其餘顯示日
  const[y,m,d]=ds.split('-').map(Number); const L=solar2lunar(y,m,d); if(!L)return '';
  return L.lDay===1 ? (L.isLeap?'閏':'')+LMONTH[L.lMonth-1]+'月' : lDayName(L.lDay);
}
function lunarFull(ds){              // 完整：六月初十
  const[y,m,d]=ds.split('-').map(Number); const L=solar2lunar(y,m,d); if(!L)return '';
  return (L.isLeap?'閏':'')+LMONTH[L.lMonth-1]+'月'+lDayName(L.lDay);
}
// 台灣國定假日：回傳 {label, off:true}；off 代表全國放假日（畫紅）。不含每年公告的補班/補假。
function twHoliday(ds){
  const[y,m,d]=ds.split('-').map(Number);
  const fixed={'1-1':'元旦','2-28':'和平紀念日','4-4':'兒童節','9-28':'教師節','10-10':'國慶日','10-25':'光復節','12-25':'行憲紀念日'};
  let label=fixed[m+'-'+d]||null, off=!!label;
  if(m===4 && termDay(y,6)===d){ label=label?label+'‧清明':'清明'; off=true; } // 清明節（節氣）
  const L=solar2lunar(y,m,d);
  if(L&&!L.isLeap){
    if(L.lMonth===1&&L.lDay>=1&&L.lDay<=3){label='春節';off=true;}
    else if(L.lMonth===5&&L.lDay===5){label='端午節';off=true;}
    else if(L.lMonth===8&&L.lDay===15){label='中秋節';off=true;}
  }
  const nd=addDays(ds,1).split('-').map(Number); const N=solar2lunar(nd[0],nd[1],nd[2]); // 除夕：隔天為正月初一
  if(N&&!N.isLeap&&N.lMonth===1&&N.lDay===1){label='除夕';off=true;}
  return off ? {label,off} : null;
}

/* ============================================================
   Render
   ============================================================ */
function render(){
  document.getElementById('mtitle').innerHTML=`${viewY}年${viewM+1}月`;
  renderTodayCard();
  if(state.view==='month') renderGrid(); else renderList();
}

function renderTodayCard(){
  const ds=todayStr();
  const shifts=myShiftsForDate(ds);
  const evs=eventsForDate(ds);
  const dow=getDOW(ds), hol=isHoliday(ds);
  let rows='';
  if(shifts.length){
    rows+=shifts.map(s=>`<span class="chip ${s.cls}">${s.range}</span>`).join('');
  }
  evs.forEach(e=>{const c=catInfo(e.category);rows+=`<span class="chip ev" style="background:${c.color}1a;color:${c.color}">${c.icon} ${esc(e.title)}${e.allDay?'':`<span class="t">${e.start||''}</span>`}</span>`;});
  if(!shifts.length&&!evs.length) rows=`<span class="tc-empty">今天沒有班，也沒有安排的行程 🌤️</span>`;
  const twh=twHoliday(ds);
  document.getElementById('todaycard').innerHTML=`
    <div class="tc-head">
      <span class="tc-date">今天 · ${viewOrTodayMonthDay(ds)}</span>
      <span class="tc-dow">星期${DOW_TW[dow]} · 農曆${lunarFull(ds)}</span>
      ${twh?`<span class="tc-badge">${twh.label||'國定假日'}</span>`:''}
    </div>
    <div class="tc-row">${rows}</div>`;
}
function viewOrTodayMonthDay(ds){const[,m,d]=ds.split('-');return `${+m}月${+d}日`;}

function renderGrid(){
  document.getElementById('monthview').style.display='';
  document.getElementById('listview').classList.remove('show');
  const grid=document.getElementById('grid');
  const dates=[];for(let d=1;d<=daysInMonth(viewY,viewM);d++)dates.push(fmtDate(viewY,viewM,d));
  const firstDow=getDOW(dates[0]);
  const today=todayStr();
  let html='';
  for(let i=0;i<firstDow;i++) html+='<div class="cell pad"></div>';
  for(const ds of dates){
    const dow=getDOW(ds), hol=isHoliday(ds), we=dow>=5;
    const day=+ds.slice(-2);
    const shifts=myShiftsForDate(ds);
    const evs=eventsForDate(ds);
    let inner='';
    // 至多顯示：班次(合併成一條 mini + color bars) + 事件
    const items=[];
    shifts.forEach(s=>items.push(`<div class="mini ${s.cls}">${s.range}</div>`));
    evs.forEach(e=>{const c=catInfo(e.category);const tm=e.allDay?'':(e.start||'');
      items.push(`<div class="mini ev" style="background:${c.color}1a;color:${c.color}">${tm?`<b>${tm}</b> `:''}${esc(e.title)}</div>`);});
    const shown=items.slice(0,3).join('');
    const extra=items.length>3?`<div class="more">+${items.length-3}</div>`:'';
    // 農曆 / 節氣 / 國定假日 小字（優先序：國定假日 > 節氣 > 農曆）
    const[yy,mm,dd]=ds.split('-').map(Number);
    const twh=twHoliday(ds), term=solarTermName(yy,mm,dd), lun=lunarShort(ds);
    let sub,subCls;
    if(twh&&twh.label){sub=twh.label;subCls='sub-hol';}
    else if(term){sub=term;subCls='sub-term';}
    else {sub=lun;subCls='sub-lunar';}
    html+=`<div class="cell ${we?'we':''} ${ds===today?'today':''} ${twh?'hol-tw':''}" onclick="openDay('${ds}')">
      <div class="daytop"><span class="dnum">${day}</span><span class="sub ${subCls}">${sub}</span></div>
      ${shown}${extra}
    </div>`;
  }
  grid.innerHTML=html;
}

function renderList(){
  document.getElementById('monthview').style.display='none';
  const box=document.getElementById('listview');
  box.classList.add('show');
  const dates=[];for(let d=1;d<=daysInMonth(viewY,viewM);d++)dates.push(fmtDate(viewY,viewM,d));
  const today=todayStr();
  let html='', any=false;
  for(const ds of dates){
    const shifts=myShiftsForDate(ds), evs=eventsForDate(ds);
    if(!shifts.length&&!evs.length) continue;
    any=true;
    const dow=getDOW(ds), we=dow>=5, day=+ds.slice(-2);
    let body='';
    shifts.forEach(s=>{body+=`<div class="ag-item"><span class="ag-time">上班</span><span class="chip ${s.cls}">${s.range}</span></div>`;});
    evs.forEach(e=>{const c=catInfo(e.category);body+=`<div class="ag-item" onclick="openForm('${e.id}','${ds}')" style="cursor:pointer">
      <span class="ag-time">${e.allDay?'全天':(e.start||'')+(e.end?'–'+e.end:'')}</span>
      <span class="chip ev" style="background:${c.color}1a;color:${c.color}">${c.icon} ${esc(e.title)}</span></div>`;});
    html+=`<div class="ag-day">
      <div class="ag-dhead" onclick="openDay('${ds}')">
        <span class="ag-dnum ${we?'we':''} ${ds===today?'today':''}">${day}</span>
        <span class="ag-dmeta"><span class="d1">${viewM+1}月${day}日 星期${DOW_TW[dow]}</span>
        <span class="d2">${isHoliday(ds)?'假日':'　'}</span></span>
        ${ds===today?'<span class="ag-todaytag">今天</span>':''}
      </div>
      <div class="ag-body">${body}</div>
    </div>`;
  }
  box.innerHTML=any?html:`<div class="ag-empty">這個月沒有班次或行程</div>`;
}

/* ============================================================
   Day sheet
   ============================================================ */
function openDay(ds){
  selectedDate=ds;
  const dow=getDOW(ds);
  const twh=twHoliday(ds);
  document.getElementById('ds-date').textContent=`${viewOrTodayMonthDay(ds)}`;
  document.getElementById('ds-dow').textContent=`星期${DOW_TW[dow]}${ds===todayStr()?' · 今天':''} · 農曆${lunarFull(ds)}`;
  const holEl=document.getElementById('ds-hol');
  if(twh){ holEl.textContent=twh.label||'國定假日'; holEl.style.display=''; } else holEl.style.display='none';
  const shifts=myShiftsForDate(ds);
  const evs=eventsForDate(ds);
  let html='';
  html+=`<div class="sec-title">我的班</div>`;
  if(shifts.length){
    html+=shifts.map(s=>`<div class="shift-line ${s.cls}"><span class="sl-name">${s.range}</span><span class="sl-time">${s.time}</span></div>`).join('');
  }else{
    html+=`<div class="noshift">這天沒有排班</div>`;
  }
  html+=`<div class="sec-title">我的行程</div>`;
  if(evs.length){
    html+=evs.map(e=>{const c=catInfo(e.category);
      return `<div class="ev-line" onclick="openForm('${e.id}','${ds}')">
        <span class="ev-cdot" style="background:${c.color}"></span>
        <span class="ev-main"><div class="ev-title">${esc(e.title)}</div>
          <div class="ev-sub">${e.allDay?'全天':(e.start||'')+(e.end?' – '+e.end:'')}${e.note?' · '+esc(e.note):''}</div></span>
        <span class="ev-cat" style="background:${c.color}1a;color:${c.color}">${c.name}</span>
        <span class="chev">›</span>
      </div>`;}).join('');
  }
  html+=`<button class="addbtn" onclick="openForm(null,'${ds}')">＋ 新增行程</button>`;
  // 同事
  const all=allSlotsForDate(ds);
  if(all.length){
    html+=`<div class="sec-title">當日全科班表</div><div class="otherbox">`;
    html+=all.map(r=>`<div class="other-row"><span class="or-slot">${r.range}</span><span class="or-doc ${r.isMe?'me':''}">${esc(r.name)}${r.isMe?' (我)':''}</span></div>`).join('');
    html+=`</div>`;
  }
  document.getElementById('ds-body').innerHTML=html;
  showSheet('daysheet');
}

/* ============================================================
   Event form
   ============================================================ */
function renderCatOptions(){
  document.getElementById('fm-cats').innerHTML=CATS.map(c=>
    `<div class="catopt ${c.v===formCat?'on':''}" style="${c.v===formCat?`background:${c.color};border-color:${c.color}`:''}" onclick="pickCat('${c.v}')">
      <span class="ci">${c.icon}</span>${c.name}</div>`).join('');
}
function pickCat(v){formCat=v;renderCatOptions();}
// 設定開始時間後，結束時間自動 +1 小時（可再手動修改）
function autoEnd(){
  const s=document.getElementById('fm-start').value;
  if(!s) return;
  const [h,m]=s.split(':').map(Number);
  let t=h*60+m+60; if(t>1439) t=1439;
  document.getElementById('fm-end').value=String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}
function toggleAllDay(){
  formAllDay=!formAllDay;
  document.getElementById('fm-allday-sw').classList.toggle('on',formAllDay);
  document.getElementById('fm-timefield').style.display=formAllDay?'none':'';
}
function openForm(id,ds){
  editingId=id;
  const del=document.getElementById('fm-del');
  if(id){
    const e=state.events[id]; if(!e){return;}
    document.getElementById('fm-title').textContent='編輯行程';
    document.getElementById('fm-name').value=e.title||'';
    document.getElementById('fm-date').value=e.date;
    formAllDay=!!e.allDay; formCat=e.category||'meeting';
    document.getElementById('fm-start').value=e.start||'09:00';
    document.getElementById('fm-end').value=e.end||'10:00';
    document.getElementById('fm-note').value=e.note||'';
    del.style.display='';
  }else{
    document.getElementById('fm-title').textContent='新增行程';
    document.getElementById('fm-name').value='';
    document.getElementById('fm-date').value=ds||todayStr();
    formAllDay=false; formCat='meeting';
    document.getElementById('fm-start').value='09:00';
    document.getElementById('fm-end').value='10:00';
    document.getElementById('fm-note').value='';
    del.style.display='none';
  }
  document.getElementById('fm-allday-sw').classList.toggle('on',formAllDay);
  document.getElementById('fm-timefield').style.display=formAllDay?'none':'';
  renderCatOptions();
  showSheet('formsheet');
  if(!id) setTimeout(()=>document.getElementById('fm-name').focus(),300);
}
function saveEvent(){
  const title=document.getElementById('fm-name').value.trim();
  const date=document.getElementById('fm-date').value;
  if(!title){toast('請輸入標題');return;}
  if(!date){toast('請選擇日期');return;}
  const start=document.getElementById('fm-start').value;
  const end=document.getElementById('fm-end').value;
  const note=document.getElementById('fm-note').value.trim();
  const id=editingId||('e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6));
  state.events[id]={id,title,date,allDay:formAllDay,start:formAllDay?'':start,end:formAllDay?'':end,category:formCat,note};
  persistEvents();
  closeSheets();
  render();
  toast(editingId?'已更新':'已新增');
}
function deleteEvent(){
  if(!editingId) return;
  if(!confirm('確定刪除這個行程？')) return;
  delete state.events[editingId];
  persistEvents();
  closeSheets();
  render();
  toast('已刪除');
}

/* ============================================================
   Sheets / view / nav
   ============================================================ */
function showSheet(id){
  document.getElementById('mask').classList.add('show');
  document.getElementById(id).classList.add('show');
}
function closeSheets(){
  document.getElementById('mask').classList.remove('show');
  ['daysheet','formsheet','monthsheet'].forEach(id=>document.getElementById(id).classList.remove('show'));
}
function setView(v){
  state.view=v;
  document.getElementById('seg-month').classList.toggle('active',v==='month');
  document.getElementById('seg-list').classList.toggle('active',v==='list');
  render();
}
function shiftMonth(n){
  viewM+=n; if(viewM<0){viewM=11;viewY--;} if(viewM>11){viewM=0;viewY++;}
  render();
}
function goToday(){const d=new Date();viewY=d.getFullYear();viewM=d.getMonth();render();}

/* 月份選擇器 */
let pkYear;
function openMonthPicker(){pkYear=viewY;renderPicker();showSheet('monthsheet');}
function pickerYear(n){pkYear+=n;renderPicker();}
function renderPicker(){
  document.getElementById('pk-year').textContent=pkYear+'年';
  const now=new Date(), ny=now.getFullYear(), nm=now.getMonth();
  let html='';
  for(let i=0;i<12;i++){
    const cur=(pkYear===viewY&&i===viewM);
    const isNow=(pkYear===ny&&i===nm);
    html+=`<button class="mopt ${cur?'on':''} ${isNow?'now':''}" onclick="jumpMonth(${pkYear},${i})">${i+1}月${isNow?'<span class="nowdot"></span>':''}</button>`;
  }
  document.getElementById('pk-months').innerHTML=html;
}
function jumpMonth(y,m){viewY=y;viewM=m;closeSheets();render();}

/* 垂直滑動換月（拖曳跟手）：往上滑 → 上個月、往下滑 → 下個月（僅月檢視、無彈窗時） */
function initSwipe(){
  const area=document.getElementById('monthview');
  if(!area) return;
  const cal=()=>area.querySelector('.cal');
  const THRESH=58;                       // 換月門檻
  let sy=0,sx=0,st=0,on=false,vert=false,decided=false;
  let animating=false,animT1=0,animT2=0,animPending=false,animDir=0;

  function finishAnim(){                  // 立即收尾（連續滑動時用），並補上還沒換的月
    clearTimeout(animT1); clearTimeout(animT2);
    if(animPending){ shiftMonth(animDir); animPending=false; }
    const c=cal(); if(c){ c.style.transition='';c.style.transform='';c.style.opacity=''; }
    animating=false;
  }

  area.addEventListener('touchstart',e=>{
    if(e.touches.length!==1||document.querySelector('.sheet.show')){on=false;return;}
    if(animating) finishAnim();           // 動畫進行中再次滑動 → 先收尾再開始
    const t=e.touches[0];sy=t.clientY;sx=t.clientX;st=Date.now();on=true;vert=false;decided=false;
    const c=cal(); if(c) c.style.transition='none';
  },{passive:true});

  area.addEventListener('touchmove',e=>{
    if(!on) return;
    const t=e.touches[0],dy=t.clientY-sy,dx=t.clientX-sx;
    if(!decided&&(Math.abs(dy)>7||Math.abs(dx)>7)){decided=true;vert=Math.abs(dy)>=Math.abs(dx);}
    if(decided&&vert){
      e.preventDefault();                // 垂直滑動時不讓頁面捲動搶動作
      const c=cal(); if(!c) return;
      // 阻尼：超過門檻後越拖越沉，像有彈性阻力
      const damp=Math.sign(dy)*Math.min(Math.abs(dy),THRESH+(Math.abs(dy)-THRESH)*0.4);
      c.style.transform=`translateY(${damp}px)`;
      c.style.opacity=String(Math.max(.5,1-Math.abs(dy)/460));
    }
  },{passive:false});

  area.addEventListener('touchend',e=>{
    if(!on) return; on=false;
    const c=cal(); if(!c) return;
    if(!vert){ resetCal(c); return; }
    const t=e.changedTouches[0],dy=t.clientY-sy,dt=Date.now()-st;
    const fast=dt<480&&Math.abs(dy)>28;
    if(Math.abs(dy)>=THRESH||fast) animateChange(c,dy<0?-1:1);   // 上滑=上個月、下滑=下個月
    else resetCal(c);                                            // 回彈
  },{passive:true});

  function resetCal(c){
    c.style.transition='transform .3s cubic-bezier(.22,1,.36,1),opacity .3s';
    c.style.transform='translateY(0)'; c.style.opacity='1';
  }
  // 純計時器動畫（不依賴 transitionend，避免頁面未合成時卡住）
  function animateChange(c,dir){
    animating=true; animPending=true; animDir=dir;
    if(navigator.vibrate) navigator.vibrate(9);
    const off=Math.min(150,(c.offsetHeight||400)*0.4);
    const outY=dir<0?-off:off;           // 上個月往上飛出、下個月往下飛出
    c.style.transition='transform .15s ease-in,opacity .15s ease-in';
    c.style.transform=`translateY(${outY}px)`; c.style.opacity='0';
    clearTimeout(animT1); clearTimeout(animT2);
    animT1=setTimeout(()=>{
      shiftMonth(dir); animPending=false;             // 換月並重繪
      c.style.transition='none';
      c.style.transform=`translateY(${-outY}px)`; c.style.opacity='0';  // 從相反方向進場
      void c.offsetHeight;                            // reflow
      c.style.transition='transform .26s cubic-bezier(.22,1,.36,1),opacity .26s';
      c.style.transform='translateY(0)'; c.style.opacity='1';
      animT2=setTimeout(()=>{ c.style.transition='';c.style.transform='';c.style.opacity=''; animating=false; },290);
    },155);
  }
}

/* ============================================================
   Persistence
   ============================================================ */
function persistEvents(){
  try{localStorage.setItem(CFG.LS_EVENTS,JSON.stringify(state.events));}catch(e){}
  cloudSaveEvents();
}
function loadLocalEvents(){
  try{const r=localStorage.getItem(CFG.LS_EVENTS);if(r)state.events=JSON.parse(r)||{};}catch(e){}
}
function cacheSchedLocal(){
  try{localStorage.setItem(CFG.LS_SCHED,JSON.stringify({
    doctors:state.doctors,schedule:state.schedule,holidays:[...state.holidays],
    defaultSplit:state.defaultSplit,holidaySplit:state.holidaySplit
  }));}catch(e){}
}
function loadSchedLocal(){
  try{
    const r=localStorage.getItem(CFG.LS_SCHED);if(!r)return false;
    const d=JSON.parse(r);
    applySchedData(d,true);
    return true;
  }catch(e){return false;}
}
function applySchedData(d,fromCache){
  if(!d) return;
  // 相容排班系統舊 key '晚班' -> '小夜'
  if(d.schedule){for(const day of Object.values(d.schedule)){if(day&&'晚班'in day){day['小夜']=day['晚班'];delete day['晚班'];}}}
  state.doctors=d.doctors||[];
  state.schedule=d.schedule||{};
  state.holidays=new Set(d.holidays||[]);
  state.defaultSplit=clampSplit(d.defaultSplit||20);
  state.holidaySplit=clampSplit(d.holidaySplit||17);
  // 解析「我」
  const me=state.doctors.find(x=>x.name===CFG.MY_NAME)||state.doctors.find(x=>x.id===CFG.MY_ID_FALLBACK);
  state.myId=me?me.id:CFG.MY_ID_FALLBACK;
  if(!fromCache) cacheSchedLocal();
}

/* ============================================================
   Cloud
   ============================================================ */
let _fbApp=null,_calRef=null;
function setCloud(cls,txt){
  const el=document.getElementById('cloud');
  el.className='cloud'+(cls?(' '+cls):'');
  document.getElementById('cloud-txt').textContent=txt;
}
function initCloud(){
  if(NOCLOUD){setCloud('','離線測試');return;}
  if(!window.firebase){setCloud('err','SDK未載入');return;}
  try{
    _fbApp=firebase.initializeApp({databaseURL:CFG.CLOUD_URL},'chenCal');
    const db=firebase.database(_fbApp);
    // 班表（只讀）
    db.ref(CFG.SCHED_REF).on('value',snap=>{
      const d=snap.val(); if(!d) return;
      applySchedData(d,false);
      render();
      setCloud('ok','已同步');
    },err=>{setCloud('err','班表讀取失敗');});
    // 我的行程（讀寫）
    _calRef=db.ref(CFG.CAL_REF);
    _calRef.on('value',snap=>{
      const d=snap.val();
      if(d&&d._client===_clientId) return;  // 略過自己寫入的回音
      const evs=(d&&d.events)?d.events:{};
      state.events=evs||{};
      try{localStorage.setItem(CFG.LS_EVENTS,JSON.stringify(state.events));}catch(e){}
      render();
    },err=>{});
    setCloud('ok','連線中…');
  }catch(e){setCloud('err','連線失敗');}
}
function cloudSaveEvents(){
  if(NOCLOUD||!_calRef) return;
  _calRef.set({events:state.events,_ts:Date.now(),_client:_clientId})
    .catch(()=>toast('雲端儲存失敗，已存本機'));
}

/* ============================================================
   Utils / init
   ============================================================ */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let _toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),1900);}

function init(){
  const d=new Date();viewY=d.getFullYear();viewM=d.getMonth();
  loadLocalEvents();
  loadSchedLocal();      // 先用本機快取畫面，雲端到了再更新
  renderCatOptions();
  render();
  initSwipe();
  initCloud();
}
document.addEventListener('DOMContentLoaded',init);
</script>
